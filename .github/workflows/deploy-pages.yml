      # - name: Deploy to Pavelcrypto70.github.io
      #   uses: JamesIves/github-pages-deploy-action@v4
      #   with:
      #     folder: build/web
      #     repository-name: Pavelcrypto70/Pavelcrypto70.github.io
      #     branch: main
      #     token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
      #     clean: true
      #     single-commit: true
