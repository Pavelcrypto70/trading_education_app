name: trading_education_app
description: Trade Master — complete trading education with lessons, quizzes, flashcards, and paper trading.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  google_fonts: ^6.2.1
  fl_chart: ^0.69.0
  shared_preferences: ^2.5.2
  url_launcher: ^6.3.1
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/lessons_full.json
    - assets/data/lessons_en.json
    - assets/data/lessons_ru.json
    - assets/data/lessons_pt.json